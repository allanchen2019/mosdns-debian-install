name: Release Precompiled Panel Binaries

on:
  push:
    tags:
      - 'v*'
    branches:
      - feat/control-panel
      - main

jobs:
  build:
    name: Build Panel Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Install Cross-Compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build for linux/amd64
        run: |
          cd panel
          go mod tidy
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../mosdns-panel-linux-amd64

      - name: Build for linux/arm64
        run: |
          cd panel
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc go build -ldflags="-s -w" -o ../mosdns-panel-linux-arm64

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: mosdns-panel-binaries
          path: |
            mosdns-panel-linux-amd64
            mosdns-panel-linux-arm64

      - name: Release Latest Binaries
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: latest
          name: Latest Precompiled Panel Binaries
          prerelease: true
          artifacts: "mosdns-panel-linux-amd64,mosdns-panel-linux-arm64"
          token: ${{ secrets.GITHUB_TOKEN }}
