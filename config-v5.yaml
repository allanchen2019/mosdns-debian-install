api:
  http: "127.0.0.1:9080"

log:
  level: debug
  file: "/var/log/mosdns/mosdns.log"

plugins:
# 1. 缓存插件 (启用乐观缓存，并持久化以防重启冷启动)
- tag: "mem_cache"
  type: cache
  args:
    size: 20480
    lazy_cache_ttl: 86400
    dump_file: "./cache.dump"
    dump_interval: 600

# 2. 域名集合
- tag: "direct_domain"
  type: domain_set
  args:
    files:
    - "./china-list.txt"
    - "./apple-cn.txt"
    - "./direct-domain.txt"
    - "./geosite_steam.txt"
    - "./geosite_nintendo.txt"
    - "./geosite_playstation.txt"
    - "./geosite_epicgames.txt"
    - "./geosite_blizzard.txt"
    - "./geosite_ea.txt"
    - "./geosite_riot.txt"
    - "./geosite_roblox.txt"
    - "./geosite_tencent-games.txt"
    - "./geosite_mihoyo-cn.txt"
    - "./geosite_bilibili-game.txt"
    - "./geosite_category-games-other.txt"

- tag: "remote_domain"
  type: domain_set
  args:
    files:
    - "./proxy-list.txt"

- tag: "local_domain"
  type: domain_set
  args:
    files:
    - "./local-domain.txt"

# 3. IP 集合
- tag: "cn_ip"
  type: ip_set
  args:
    files:
    - "./cn_ipv4.txt"
    - "./cn_ipv6.txt"

# 4. 上游转发
- tag: "router_forward"
  type: forward
  args:
    concurrent: 1
    upstreams:
    - addr: "192.168.4.1"

- tag: "local_forward"
  type: forward
  args:
    concurrent: 2
    upstreams:
    - addr: "119.29.29.29"
    - addr: "223.5.5.5"

- tag: "remote_forward"
  type: forward
  args:
    concurrent: 2


    upstreams:
    - addr: "tls://1.1.1.1:853"
      enable_pipeline: true
    - addr: "tls://8.8.8.8:853"
      enable_pipeline: true


# 5. 自愈兜底策略 (隐私优先：始终先尝试隧道，500ms 超时后回退国内 DNS)
- tag: "remote_fallback_strategy"
  type: fallback
  args:
    primary: remote_forward
    secondary: local_forward
    threshold: 500
    always_standby: false

# 6. ECS 处理器 (用于国内 CDN 调度优化与国外隐私保护)
- tag: "ecs_domestic"
  type: "ecs_handler"
  args:
    forward: true
    send: true
    mask4: 24
    mask6: 48

- tag: "ecs_remote"
  type: "ecs_handler"
  args:
    forward: false
    send: false

# ---------------- 逻辑序列 ----------------

- tag: "local_router_sequence"
  type: sequence
  args:
  - exec: $router_forward
  - exec: query_summary [router_hit]
  - exec: return

- tag: "local_sequence"
  type: sequence
  args:
  - exec: $ecs_domestic
  - exec: $local_forward
  - exec: query_summary [local_hit]
  - exec: return

- tag: "remote_sequence"
  type: sequence
  args:
  - exec: $ecs_remote
  - exec: $remote_fallback_strategy
  - exec: query_summary [remote_hit_resilient]
  - exec: return

- tag: "fallback_sequence"
  type: sequence
  args:
  - exec: $ecs_domestic
  - exec: $local_forward
  - matches: "resp_ip $cn_ip"
    exec: query_summary [fallback_cn_hit]
  - matches: "resp_ip $cn_ip"
    exec: accept
  - exec: query_summary [fallback_remote_trial]
  - exec: drop_resp
  - exec: $ecs_remote
  - exec: $remote_fallback_strategy
  - exec: query_summary [fallback_remote_final_resilient]
  - exec: return

- tag: "main_sequence"
  type: sequence
  args:
  - matches: "qtype 12"
    exec: goto local_router_sequence

  - matches: "qname $local_domain"
    exec: goto local_router_sequence

  - exec: $mem_cache
  - matches: has_resp
    exec: query_summary [cache_hit]
  - matches: has_resp
    exec: accept

  - matches: "qname $remote_domain"
    exec: goto remote_sequence

  - matches: "qname $direct_domain"
    exec: goto local_sequence

  - exec: goto fallback_sequence

# ---------------- 服务器监听 ----------------
- type: udp_server
  args:
    entry: main_sequence
    listen: :53

- type: tcp_server
  args:
    entry: main_sequence
    listen: :53